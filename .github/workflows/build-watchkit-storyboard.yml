# Builds the WatchKit storyboard on macOS 14 with Xcode 15 and commits the
# compiled Interface.storyboardc so the project builds on Xcode 26 (macOS 26)
# without compiling the storyboard. Run this workflow when the storyboard
# or WatchKit app structure changes.
name: Build WatchKit storyboard for watchOS 8

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'YouTooOld/YouTooOld WatchKit App/Interface.storyboard'
      - '.github/workflows/build-watchkit-storyboard.yml'

jobs:
  build-storyboard:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode 15
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15'

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Find project paths
        id: project
        run: |
          PBXPROJ=$(find . -name "project.pbxproj" -not -path "*/build/*" -not -path "*/.build/*" 2>/dev/null | head -1)
          if [ -z "$PBXPROJ" ]; then
            echo "::error::project.pbxproj not found in repo"
            find . -name "*.pbxproj" 2>/dev/null || true
            exit 1
          fi
          PBXPROJ="${PBXPROJ#./}"
          echo "pbxproj=$PBXPROJ" >> $GITHUB_OUTPUT
          PROJECT_DIR=$(dirname "$(dirname "$PBXPROJ")")
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT
          WATCHKIT_APP_DIR=$(find . -type d -name "YouTooOld WatchKit App" -not -path "*/build/*" 2>/dev/null | head -1)
          WATCHKIT_APP_DIR="${WATCHKIT_APP_DIR#./}"
          echo "watchkit_app_dir=$WATCHKIT_APP_DIR" >> $GITHUB_OUTPUT
          echo "Found pbxproj: $PBXPROJ, project_dir: $PROJECT_DIR, watchkit_dir: $WATCHKIT_APP_DIR"

      - name: Revert project to compile storyboard (for this CI run)
        run: python3 scripts/revert-to-storyboard.py "${{ steps.project.outputs.pbxproj }}"

      - name: Downgrade project format for Xcode 15 (77 → 56)
        run: |
          sed -i.bak 's/objectVersion = 77/objectVersion = 56/' "${{ steps.project.outputs.pbxproj }}"
          rm -f "${{ steps.project.outputs.pbxproj }}.bak"

      - name: Diagnose storyboard compile (ibtool)
        run: |
          STORYBOARD="${{ steps.project.outputs.watchkit_app_dir }}/Interface.storyboard"
          OUT="$(mktemp -d)"
          echo "::group::ibtool compile Interface.storyboard"
          ibtool --compile "$OUT" "$STORYBOARD" 2>&1 || true
          echo "::endgroup::"
          rm -rf "$OUT"

      - name: Build WatchKit App (compiles storyboard)
        env:
          PROJECT_DIR: ${{ steps.project.outputs.project_dir }}
          PBXPROJ: ${{ steps.project.outputs.pbxproj }}
        run: |
          cd "$PROJECT_DIR"
          XCODEPROJ=$(dirname "$PBXPROJ")
          set -o pipefail
          xcodebuild \
            -project "$(basename "$XCODEPROJ")" \
            -scheme YouTooOld \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            -derivedDataPath ../derived_data \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee ../build.log || true
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "::group::Build log (errors and last 120 lines)"
            grep -i "error:" ../build.log || true
            echo "---"
            tail -120 ../build.log
            echo "::endgroup::"
            exit "$BUILD_EXIT"
          fi

      - name: Find and extract Interface.storyboardc
        run: |
          APP=$(find ./derived_data -name "YouTooOld WatchKit App.app" -type d -path "*/Build/Products/*" 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "::error::YouTooOld WatchKit App.app not found in build products"
            find ./derived_data -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          if [ ! -d "$APP/Interface.storyboardc" ]; then
            echo "::error::Interface.storyboardc not found inside the app"
            ls -la "$APP"
            exit 1
          fi
          WATCHKIT_DIR="${{ steps.project.outputs.watchkit_app_dir }}"
          rm -rf "$WATCHKIT_DIR/Interface.storyboardc"
          cp -R "$APP/Interface.storyboardc" "$WATCHKIT_DIR/"
          echo "Copied Interface.storyboardc into $WATCHKIT_DIR"

      - name: Update project to use pre-compiled storyboardc
        run: python3 scripts/switch-to-storyboardc.py "${{ steps.project.outputs.pbxproj }}"

      - name: Upload storyboardc and project (download and commit locally)
        uses: actions/upload-artifact@v4
        with:
          name: watchkit-storyboardc
          path: |
            ${{ steps.project.outputs.watchkit_app_dir }}/Interface.storyboardc
            ${{ steps.project.outputs.pbxproj }}
