# Builds the WatchKit storyboard on macOS 14 with Xcode 15 and commits the
# compiled Interface.storyboardc so the project builds on Xcode 26 (macOS 26)
# without compiling the storyboard. Run this workflow when the storyboard
# or WatchKit app structure changes.
name: Build WatchKit storyboard for watchOS 8

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'YouTooOld/YouTooOld WatchKit App/Interface.storyboard'
      - '.github/workflows/build-watchkit-storyboard.yml'

jobs:
  build-storyboard:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode 15
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15'

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Revert project to compile storyboard (for this CI run)
        run: python3 scripts/revert-to-storyboard.py YouTooOld/YouTooOld.xcodeproj/project.pbxproj

      - name: Build WatchKit App (compiles storyboard)
        run: |
          cd YouTooOld
          xcodebuild \
            -project YouTooOld.xcodeproj \
            -scheme YouTooOld \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            -derivedDataPath ../derived_data \
            build

      - name: Find and extract Interface.storyboardc
        run: |
          APP=$(find ./derived_data -name "YouTooOld WatchKit App.app" -type d -path "*/Build/Products/*" 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "::error::YouTooOld WatchKit App.app not found in build products"
            find ./derived_data -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          if [ ! -d "$APP/Interface.storyboardc" ]; then
            echo "::error::Interface.storyboardc not found inside the app"
            ls -la "$APP"
            exit 1
          fi
          rm -rf YouTooOld/YouTooOld\ WatchKit\ App/Interface.storyboardc
          cp -R "$APP/Interface.storyboardc" "YouTooOld/YouTooOld WatchKit App/"
          echo "Copied Interface.storyboardc into repo"

      - name: Update project to use pre-compiled storyboardc
        run: python3 scripts/switch-to-storyboardc.py YouTooOld/YouTooOld.xcodeproj/project.pbxproj

      - name: Commit and push storyboardc
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "YouTooOld/YouTooOld WatchKit App/Interface.storyboardc"
          git add "YouTooOld/YouTooOld.xcodeproj/project.pbxproj"
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: add pre-compiled WatchKit storyboard for Xcode 26 (watchOS 8)"
            git push
          fi
