# Build WatchKit Interface.storyboard on macOS 13 (Xcode 15) and commit Interface.storyboardc.
# Required because Xcode 26+ cannot compile WatchKit storyboards (ibtool fails on interfaceController).
# Run manually or on push when Interface.storyboard or this workflow changes.

name: Build WatchKit storyboard for watchOS 8

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'YouTooOld WatchKit App/Interface.storyboard'
      - '.github/workflows/build-watchkit-storyboard.yml'

jobs:
  build-storyboard:
    runs-on: macos-13
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare project for build (use storyboard so Xcode 15 compiles it)
        run: |
          PBX="YouTooOld.xcodeproj/project.pbxproj"
          # If project already uses storyboardc, temporarily switch to storyboard for this build
          sed -i '' 's|A1B101512F50D35600093105 /\* Interface.storyboardc in Resources \*/|A1B101382F50D35600093105 /* Interface.storyboard in Resources */|g' "$PBX"
          sed -i '' 's|A1B101502F50D35600093105 /\* Interface.storyboardc \*/|A1B101062F50D35600093105 /* Interface.storyboard */|g' "$PBX"
          sed -i '' 's|lastKnownFileType = folder; path = Interface.storyboardc|lastKnownFileType = file.storyboard; path = Interface.storyboard|g' "$PBX"

      - name: Build WatchKit App (produces Interface.storyboardc in app bundle)
        run: |
          xcodebuild -project YouTooOld.xcodeproj \
            -scheme "YouTooOld WatchKit App" \
            -configuration Debug \
            -sdk watchos \
            -destination 'generic/platform=watchOS' \
            -derivedDataPath build \
            build

      - name: Copy Interface.storyboardc to source tree
        run: |
          APP="build/Build/Products/Debug-watchos/YouTooOld WatchKit App.app"
          if [ ! -d "$APP/Interface.storyboardc" ]; then
            echo "::error::Interface.storyboardc not found in $APP"
            exit 1
          fi
          rm -rf "YouTooOld WatchKit App/Interface.storyboardc"
          cp -R "$APP/Interface.storyboardc" "YouTooOld WatchKit App/"

      - name: Switch project to use Interface.storyboardc (for Xcode 26)
        run: |
          PBX="YouTooOld.xcodeproj/project.pbxproj"
          sed -i '' 's|A1B101382F50D35600093105 /\* Interface.storyboard in Resources \*/|A1B101512F50D35600093105 /* Interface.storyboardc in Resources */|g' "$PBX"
          sed -i '' 's|A1B101062F50D35600093105 /\* Interface.storyboard \*/|A1B101502F50D35600093105 /* Interface.storyboardc */|g' "$PBX"
          sed -i '' 's|lastKnownFileType = file.storyboard; path = Interface.storyboard|lastKnownFileType = folder; path = Interface.storyboardc|g' "$PBX"

      - name: Commit and push Interface.storyboardc
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "YouTooOld WatchKit App/Interface.storyboardc" "YouTooOld.xcodeproj/project.pbxproj"
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "ci: add Interface.storyboardc for watchOS 8 (Xcode 26 compatible)"
            git push
          fi
